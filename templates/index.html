<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction Platform</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <h1>
        <i class="fa-solid fa-robot"></i>
        Customer Retention Intelligence Platform
    </h1>

    <form action="/predict" method="POST">

        <div class="section">

            <h2>👤 Customer Information</h2>

            <div class="grid">

                <div>

                    <label>Gender</label>

                    <select name="gender">

                        <option>Male</option>
                        <option>Female</option>

                    </select>

                </div>

                <div>

                    <label>Senior Citizen</label>

                    <select name="senior">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div>

                    <label>Partner</label>

                    <select name="partner">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div>

                    <label>Dependents</label>

                    <select name="dependents">

                        <option>No</option>
                        <option>Yes</option>

                    </select>

                </div>

                <div>

                    <label>Tenure Months</label>

                    <input type="number"
                           name="tenure"
                           required>

                </div>

                <div>

                    <label>Monthly Charges</label>

                    <input type="number"
                           step="0.01"
                           name="monthly_charges"
                           required>

                </div>

                <div>

                    <label>Total Charges</label>

                    <input type="number"
                           step="0.01"
                           name="total_charges"
                           required>

                </div>

            </div>

        </div>

        <div class="section">

            <h2>🌐 Services</h2>

            <div class="grid">

                <div>

                    <label>Phone Service</label>

                    <select name="phone">

                        <option>Yes</option>
                        <option>No</option>

                    </select>

                </div>

                <div>

                    <label>Multiple Lines</label>

                    <select name="multiple_lines">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No phone service</option>

                    </select>

                </div>

                <div>

                    <label>Internet Service</label>

                    <select name="internet">

                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>No</option>

                    </select>

                </div>

                <div>

                    <label>Online Security</label>

                    <select name="online_security">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div>

                    <label>Online Backup</label>

                    <select name="online_backup">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div>

                    <label>Device Protection</label>

                    <select name="device_protection">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div>

                    <label>Tech Support</label>

                    <select name="tech_support">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div>

                    <label>Streaming TV</label>

                    <select name="streaming_tv">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

                <div>

                    <label>Streaming Movies</label>

                    <select name="streaming_movies">

                        <option>No</option>
                        <option>Yes</option>
                        <option>No internet service</option>

                    </select>

                </div>

            </div>

        </div>

        <div class="section">

            <h2>💳 Billing</h2>

            <div class="grid">

                <div>

                    <label>Contract</label>

                    <select name="contract">

                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>

                    </select>

                </div>

                <div>

                    <label>Paperless Billing</label>

                    <select name="paperless">

                        <option>Yes</option>
                        <option>No</option>

                    </select>

                </div>

                <div>

                    <label>Payment Method</label>

                    <select name="payment">

                        <option>Electronic check</option>
                        <option>Mailed check</option>
                        <option>Bank transfer (automatic)</option>
                        <option>Credit card (automatic)</option>

                    </select>

                </div>

            </div>

        </div>

        <button type="submit">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
            Predict Customer Churn
        </button>

    </form>

</div>

</body>

</html>
